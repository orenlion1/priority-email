apiVersion: apps/v1
kind: Deployment
metadata:
  name: priority-email-service
  namespace: priority-email
  labels:
    app.kubernetes.io/name: priority-email-service
    app.kubernetes.io/part-of: priority-email
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: priority-email-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: priority-email-service
        app.kubernetes.io/part-of: priority-email
      annotations:
        observability.grafana.com/collect-logs: "true"
    spec:
      serviceAccountName: priority-email-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: priority-email-service
          image: public.ecr.aws/example/priority-email-service:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: priority-email-secrets
          env:
            - name: EMAIL_POLL_STATE_FILE
              value: /tmp/email-poller-state.json
            - name: EMAIL_POLL_INTERVAL_SECONDS
              value: "600"
            - name: OTEL_SERVICE_NAME
              value: priority-email-service
            - name: OTEL_SERVICE_NAMESPACE
              value: priority-email
            - name: OTEL_DEPLOYMENT_ENVIRONMENT
              value: production
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.priority-email.svc.cluster.local:4318
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: filters
              mountPath: /app/filters
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: filters
          configMap:
            name: priority-email-filters
