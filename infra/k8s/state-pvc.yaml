  namespace: priority-email
  labels:
    app.kubernetes.io/name: priority-email-service
    app.kubernetes.io/part-of: priority-email
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
