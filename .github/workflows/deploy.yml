name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: deploy-priority-email
  cancel-in-progress: false

jobs:
  changes:
    # Only consider the exact commit that just passed CI on main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
      filters: ${{ steps.filter.outputs.filters }}
    steps:
      - name: Check out the CI-tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Diff against the last deployed commit
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Roll the Lambda code only when code-affecting paths changed since the last
          # successful Deploy: scripts/**, filter templates, or this workflow. Sync live
          # filters (to S3) when the encrypted filter ops log or filter tooling changed.
          # Range diff keeps multi-commit pushes and skipped docs-only commits accounted for.
          base="$(gh run list --workflow Deploy --status success --branch main --limit 1 --json headSha --jq '.[0].headSha // empty')"
          deploy=false
          filters=false
          if [ -z "$base" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "No usable previous deploy base; deploying."
            deploy=true
            filters=true
          else
            changed="$(git diff --name-only "$base" "$HEAD_SHA")"
            echo "Changed files since $base:"; echo "$changed"
            if echo "$changed" | grep -qE '^(scripts/|filters/[^/]+$|\.github/workflows/deploy\.yml)'; then
              deploy=true
            fi
            if echo "$changed" | grep -qE '^(filters/ops/|scripts/filters/|\.github/workflows/deploy\.yml)'; then
              filters=true
            fi
          fi
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"
          echo "filters=$filters" >> "$GITHUB_OUTPUT"
          echo "Will deploy Lambda code: $deploy; will sync filters to S3: $filters"

  deploy:
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      AWS_REGION: us-east-1
    steps:
      - name: Check out the CI-tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build zip and update Lambda code
        run: scripts/aws/deploy-lambda.sh

  sync-filters:
    needs: [changes, deploy]
    # Run after the code deploy when both fire, but do not require it.
    if: >-
      always() &&
      needs.changes.outputs.filters == 'true' &&
      (needs.deploy.result == 'success' || needs.deploy.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      AWS_REGION: us-east-1
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
    steps:
      - name: Check out the CI-tested commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install age
        run: sudo apt-get update -q && sudo apt-get install -y -q age

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decrypt ops, assemble filters, sync to S3, and verify
        env:
          AGE_SECRET_KEY: ${{ secrets.AGE_SECRET_KEY }}
          STATE_BUCKET: priority-email-state-${{ secrets.AWS_ACCOUNT_ID }}
        run: scripts/filters/sync-filters-to-s3.sh
