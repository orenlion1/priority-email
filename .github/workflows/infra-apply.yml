name: Infra Apply

# Terraform for priority-email's infrastructure, run in CI under scoped OIDC roles
# (orenlion1 standard — see core-infra docs/standards/terraform-ci-oidc.md).
#
#   plan   on every PR touching infra/terraform, under a READ-ONLY role, posted
#          back as a PR comment.
#   apply  on push to main (and manual dispatch), under a WRITE role that is only
#          assumable from the required-reviewer "terraform-apply" environment —
#          so no run changes infrastructure without a human approving first.
#
# The Lambda ZIP is built here only so `filebase64sha256(var.lambda_zip)` resolves;
# the function's code is owned by the separate Deploy workflow (Terraform ignores
# the function's filename/source_code_hash), so an infra apply never rolls code.
#
# Both jobs SKIP until AWS_PLAN_ROLE_ARN / AWS_APPLY_ROLE_ARN repo variables are
# set — the roles are created by the first (laptop) apply that bootstraps them.

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-apply.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-apply.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # mint the OIDC token; replaces AWS access keys
  pull-requests: write

concurrency:
  group: infra-apply-priority-email
  cancel-in-progress: false # never cancel a half-finished apply

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.11.0"
  TF_IN_AUTOMATION: "true"
  TF_STATE_KEY: stacks/priority-email/terraform.tfstate

jobs:
  plan:
    if: github.event_name == 'pull_request' && vars.AWS_PLAN_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Build the Lambda zip (so filebase64sha256 resolves)
        run: scripts/aws/build-lambda-zip.sh

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }} # read-only
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init
        run: |
          terraform -chdir=infra/terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: plan
        run: |
          terraform -chdir=infra/terraform plan -no-color -input=false | tee plan.txt

      - name: comment plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('infra/terraform/plan.txt', 'utf8');
            if (plan.length > 60000) plan = plan.slice(0, 60000) + '\n... truncated ...';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### terraform plan: infra/terraform\n```hcl\n' + plan + '\n```',
            });

  apply:
    if: github.event_name != 'pull_request' && vars.AWS_APPLY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: terraform-apply # <- required reviewer lives here
    steps:
      - uses: actions/checkout@v7

      - name: Build the Lambda zip (so filebase64sha256 resolves)
        run: scripts/aws/build-lambda-zip.sh

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }} # only assumable from this environment
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: init
        run: |
          terraform -chdir=infra/terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: apply
        run: terraform -chdir=infra/terraform apply -auto-approve -input=false
