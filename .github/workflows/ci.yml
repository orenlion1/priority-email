name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # assume the slackkit-reader OIDC role to install from CodeArtifact

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # The Slack command layer (scripts/slack) depends on the shared `slackkit`
      # package, published to the private CodeArtifact repo. Assume the read-only
      # slackkit-reader role via OIDC and install it before the tests import it.
      # The account id comes from the AWS_ACCOUNT_ID secret so no real identifier
      # is committed (the secret scan rejects those).
      - name: Configure AWS credentials (CodeArtifact read)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/slackkit-reader
          aws-region: us-east-1

      - name: Install slackkit from CodeArtifact
        run: |
          aws codeartifact login --tool pip --domain orenlion1 \
            --domain-owner "${{ secrets.AWS_ACCOUNT_ID }}" --repository python
          pip install slackkit

      - name: Python syntax
        run: python -m compileall scripts tests

      - name: Unit tests
        run: python -m unittest discover tests

      - name: Shell syntax
        run: |
          bash -n scripts/aws/sync-runtime-secret.sh scripts/aws/bootstrap-aws.sh scripts/aws/build-lambda-zip.sh scripts/aws/deploy-lambda.sh scripts/filters/add-filter-op.sh scripts/filters/decrypt-filters.sh scripts/filters/sync-filters-to-s3.sh

      - name: Build Lambda package
        run: bash scripts/aws/build-lambda-zip.sh

      - name: Secret and forbidden-path scan
        run: python scripts/ci/secret-scan.py
